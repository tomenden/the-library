<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="0" fill="#f9f9f7"/>

  <!-- Open book - clean minimal style -->
  <g transform="translate(512, 490)">
    <!-- Left page -->
    <path d="M-30,-160 C-30,-160 -200,-180 -280,-140 L-280,140 C-200,100 -30,120 -30,120 Z"
          fill="#e8e5e0" stroke="#032421" stroke-width="12" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M30,-160 C30,-160 200,-180 280,-140 L280,140 C200,100 30,120 30,120 Z"
          fill="#e8e5e0" stroke="#032421" stroke-width="12" stroke-linejoin="round"/>
    <!-- Spine -->
    <path d="M-30,-160 C-10,-130 10,-130 30,-160"
          fill="none" stroke="#032421" stroke-width="12" stroke-linecap="round"/>
    <path d="M-30,120 C-10,150 10,150 30,120"
          fill="none" stroke="#032421" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="-145" x2="0" y2="135" stroke="#032421" stroke-width="6" opacity="0.3"/>

    <!-- Text lines on left page -->
    <line x1="-220" y1="-90" x2="-80" y2="-90" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
    <line x1="-230" y1="-55" x2="-70" y2="-55" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
    <line x1="-225" y1="-20" x2="-75" y2="-20" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
    <line x1="-220" y1="15" x2="-100" y2="15" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
    <line x1="-215" y1="50" x2="-80" y2="50" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>

    <!-- Text lines on right page -->
    <line x1="80" y1="-90" x2="220" y2="-90" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
    <line x1="70" y1="-55" x2="230" y2="-55" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
    <line x1="75" y1="-20" x2="225" y2="-20" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
    <line x1="80" y1="15" x2="210" y2="15" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
    <line x1="85" y1="50" x2="215" y2="50" stroke="#032421" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
  </g>
</svg>
